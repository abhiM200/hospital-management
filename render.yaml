services:
  - type: web
    name: dr-vandita-clinic
    env: docker
    plan: free
    branch: master
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: ADMIN_PIN
        value: 1234
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: ANTHROPIC_API_KEY
        value: ""
